<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Prompt App</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/thumb.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #f5f5f7;
      color: #1d1d1f;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 14px 20px;
      background: #fff;
      border-bottom: 1px solid #e5e5ea;
      font-weight: 600;
      font-size: 15px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 680px;
      width: fit-content;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      background: #0a84ff;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #fff;
      border: 1px solid #e5e5ea;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.assistant.streaming::after {
      content: '▋';
      animation: blink 0.8s step-end infinite;
      margin-left: 2px;
      opacity: 0.6;
    }

    @keyframes blink {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0; }
    }

    .message.error {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #c0392b;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    #input-row {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      background: #fff;
      border-top: 1px solid #e5e5ea;
    }

    #prompt {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid #d1d1d6;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      height: 40px;
      line-height: 1.4;
      transition: border-color 0.15s;
    }

    #prompt:focus {
      border-color: #0a84ff;
    }

    #send {
      padding: 0 16px;
      background: #0a84ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      height: 40px;
      transition: background 0.15s;
    }

    #send:hover { background: #0071e3; }
    #send:disabled { background: #a0c4ff; cursor: default; }
  </style>
</head>
<body>
  <header>Prompt App</header>
  <div id="messages"></div>
  <div id="input-row">
    <textarea id="prompt" placeholder="Ask something…" rows="1"></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages')
    const promptEl = document.getElementById('prompt')
    const sendEl = document.getElementById('send')
    const history = []

    sendEl.addEventListener('click', send)
    promptEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault()
        send()
      }
    })

    async function send() {
      const text = promptEl.value.trim()
      if (!text) return

      promptEl.value = ''
      sendEl.disabled = true

      appendMessage('user', text)
      history.push({ role: 'user', content: text })

      const replyEl = appendMessage('assistant', '')
      replyEl.classList.add('streaming')

      try {
        let reply = ''
        for await (const chunk of beaker.ai.chat(history)) {
          reply += chunk
          replyEl.textContent = reply
          messagesEl.scrollTop = messagesEl.scrollHeight
        }
        history.push({ role: 'assistant', content: reply })
      } catch (err) {
        replyEl.remove()
        appendMessage('error', `Error: ${err.message}`)
      } finally {
        replyEl.classList.remove('streaming')
        sendEl.disabled = false
        promptEl.focus()
      }
    }

    function appendMessage(role, text) {
      const el = document.createElement('div')
      el.className = `message ${role}`
      el.textContent = text
      messagesEl.appendChild(el)
      messagesEl.scrollTop = messagesEl.scrollHeight
      return el
    }
  </script>
</body>
</html>
